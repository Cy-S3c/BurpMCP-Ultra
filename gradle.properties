kotlin.code.style=official
org.gradle.jvmargs=-Xmx2048m

# NOTE: do not set `org.gradle.java.home` here. Hardcoding an absolute JDK path
# breaks the build on any machine without that exact path (it previously pinned a
# Linux-only path, so Windows/macOS clones failed instantly). The build instead
# pins compilation to JDK 17 via a Gradle toolchain (see build.gradle.kts), which
# auto-detects an installed JDK 17 on any OS.
#
# Run the Gradle launcher itself with a JDK 17-21. If your default `java` is newer
# (e.g. Burp's bundled Java 25), point JAVA_HOME at a JDK 17 before building:
#   Linux/macOS : export JAVA_HOME=/path/to/jdk-17
#   Windows     : set JAVA_HOME=C:\path\to\jdk-17
